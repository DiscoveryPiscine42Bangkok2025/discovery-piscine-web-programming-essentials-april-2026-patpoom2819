<!DOCTYPE html>
<html>
    <body>
        <div class="calculator">
            <input type="text" id = "left" placeholder="Number" >

            <select id="operator">
                    <option value='+'>+</option>
                    <option value='-'>-</option>
                    <option value='*'>*</option>
                    <option value='/'>/</option>
                    <option value='%'>%</option>
            </select>

            <input type="text" id = "right"  placeholder="Number" >
                
            <input type="submit" value="Try me!" id="btn">
        </div>    

    </body>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('btn');

            btn.onclick = function() {
                
                const rawLeft = document.getElementById("left").value;
                const rawRight = document.getElementById("right").value;
                const op = document.getElementById("operator").value;

                
                const isPositiveInteger = (str) => /^\d+$/.test(str);

                if (!isPositiveInteger(rawLeft) || !isPositiveInteger(rawRight)) {
                    alert("Error :(");
                    return;
                }

                const v1 = parseInt(rawLeft);
                const v2 = parseInt(rawRight);

                if ((op === "/" || op === "%") && v2 === 0) {
                    const msg = "It's over 9000!";
                    alert(msg);
                    console.log(msg);
                    return;
                }

                
                let result;
                switch (op) {
                    case '+': result = v1 + v2; break;
                    case '-': result = v1 - v2; break;
                    case '*': result = v1 * v2; break;
                    case '/': result = v1 / v2; break;
                    case '%': result = v1 % v2; break;
                }

                
                alert(result);
                console.log(result);
            };

            
            setInterval(() => {
                alert("Please, use me...");
            }, 30000);
        });
    </script>
</html>

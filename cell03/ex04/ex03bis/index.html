<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ft_list</title>
    <style>
        body {
            padding: 20px;
        }

        .todo-item {
            padding: 12px;
            margin: 5px 0;
            background: whitesmoke;
            border: 1px solid lightgray;
            cursor: pointer;
        }

        #ft_list {
            border: 1px solid black;
            min-height: 670px;
        }

        .todo-item:hover {
            background: gray;
        }
    </style>
</head>

<body>

    <button id="newBtn">New</button>
    <div id="ft_list"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="todo.js"></script>
</body>

</html>

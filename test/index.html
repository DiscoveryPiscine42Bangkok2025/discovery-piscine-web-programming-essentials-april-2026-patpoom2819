<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Showcase</title>
    <link rel="stylesheet" href="css/index.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
</head>

<body>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">

        <header class="hero">
            <p class="label">42 Bangkok · Piscine Discovery Rush</p>
            <h1 class="title">Our<br /><em>Portfolios</em></h1>
            <p class="subtitle">Two developers. One week of learning. Choose a portfolio to explore.</p>
        </header>

        <section class="cards">

            <a href="portfolio1.html" class="card" id="card-1">
                <div class="card-number">01</div>
                <div class="card-body">
                    <h2 class="card-name">Alex Johnson</h2>
                    <p class="card-role">Frontend Developer</p>
                    <ul class="card-tags">
                        <li>HTML</li>
                        <li>CSS</li>
                        <li>JavaScript</li>
                    </ul>
                </div>
                <div class="card-arrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </div>
            </a>

            <a href="portfolio2.html" class="card" id="card-2">
                <div class="card-number">02</div>
                <div class="card-body">
                    <h2 class="card-name">Mika Tanaka</h2>
                    <p class="card-role">Full-Stack Developer</p>
                    <ul class="card-tags">
                        <li>React</li>
                        <li>Node.js</li>
                        <li>Python</li>
                    </ul>
                </div>
                <div class="card-arrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </div>
            </a>

        </section>

        <footer class="footer">
            <p>42 Bangkok · 2025</p>
        </footer>

    </main>

    <script src="js/index.js"></script>
</body>

</html>
